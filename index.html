<style>
:root {
  --bg:       #05060e;
  --surface:  #0b0d1c;
  --card:     #10132a;
  --border:   #1a1d35;
  --border2:  #242848;
  --red:      #f03e3e;
  --orange:   #fd7e14;
  --amber:    #f59f00;
  --teal:     #20c997;
  --blue:     #4dabf7;
  --violet:   #9775fa;
  --pink:     #f783ac;
  --text:     #e8eaf6;
  --muted:    #555880;
  --syne:     'Syne', sans-serif;
  --mono:     'DM Mono', monospace;
  --body:     'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
  z-index: 3000;
}

.brand {
  font-family: var(--syne);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--red);
  text-transform: uppercase;
  white-space: nowrap;
}

.brand span { color: var(--text); }

.topbar-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.tf {
  padding: 4px 11px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tf:hover { border-color: var(--amber); color: var(--amber); }
.tf.on { color: #000; font-weight: 500; }
.tf[data-type="Mob Lynching"].on     { background:var(--red);    border-color:var(--red); }
.tf[data-type="Physical Assault"].on { background:var(--orange);  border-color:var(--orange); }
.tf[data-type="Property Attack"].on  { background:var(--teal);    border-color:var(--teal); }
.tf[data-type="Communal Riot"].on    { background:var(--violet);  border-color:var(--violet); }
.tf[data-type="Hate Speech"].on      { background:var(--pink);    border-color:var(--pink); }
.tf[data-type="Threats/Coercion"].on { background:var(--blue);    border-color:var(--blue); }
.tf[data-type="all"].on              { background:var(--amber);   border-color:var(--amber); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.stat-pill {
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 4px 10px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 10px;
  white-space: nowrap;
}

.stat-pill b { color: var(--red); }

.view-btns {
  display: flex;
  border: 1px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
}

.vb {
  padding: 5px 12px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.12s;
  text-transform: uppercase;
}
.vb + .vb { border-left: 1px solid var(--border2); }
.vb.on { background: var(--red); color: #fff; }

/* ── LAYOUT ── */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map {
  flex: 1;
  height: 100%;
  background: #07091a;
}

/* ── CASE PANEL (right drawer) ── */
.case-panel {
  width: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow: hidden;
  transition: width 0.3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.case-panel.open {
  width: 420px;
}

.panel-close {
  position: absolute;
  top: 60px;
  right: 426px;
  width: 28px;
  height: 28px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--muted);
  z-index: 2000;
  transition: all 0.15s;
}
.panel-close:hover { background: var(--red); color: white; border-color: var(--red); }
.panel-close.show { display: flex; }

.case-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.case-scroll::-webkit-scrollbar { width: 3px; }
.case-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

/* Case header */
.case-type-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.case-title {
  font-family: var(--syne);
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
}

.case-meta-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.meta-chip {
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 3px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.meta-chip b { color: var(--text); }

.case-divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

.case-section-title {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.case-desc {
  font-size: 13px;
  line-height: 1.7;
  color: #b0b3cc;
  margin-bottom: 14px;
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 20px;
  margin-bottom: 14px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 6px;
  bottom: 6px;
  width: 1px;
  background: var(--border2);
}

.tl-item {
  position: relative;
  margin-bottom: 10px;
}

.tl-item::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 5px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border2);
  border: 1px solid var(--border2);
}

.tl-item.key::before { background: var(--red); border-color: var(--red); }

.tl-date {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 1px;
}

.tl-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
}

/* Related articles */
.article-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 11px 13px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: block;
}

.article-card:hover {
  border-color: var(--amber);
  background: rgba(245,159,0,0.05);
}

.article-source {
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.article-title {

}

.article-date {

}

.article-card .ext-icon {

  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* Related cases */
.related-case {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;

  border: 1px solid var(--border2);
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.related-case:hover { border-color: var(--blue); }

.rc-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.rc-title {
  font-size: 11px;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
}

.rc-year {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
}

/* Victim/accused info */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.info-box {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px;
}

.info-box-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.info-box-val {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
}

/* Outcome badge */
.outcome-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 14px;
}

/* Search bar */
.search-bar {

}

.search-input {

  font-size: 10px;
}

.leg-row {

  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
  color: var(--text);
}

.leg-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Hover tooltip override */
.leaflet-tooltip {
  background: rgba(5,6,14,0.95) !important;
  border: 1px solid var(--border2) !important;
  color: var(--text) !important;

  max-width: 200px !important;
}

.leaflet-tooltip::before { display: none !important; }

/* Pulse animation for selected marker */
@keyframes markerPulse {
  0% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.6); opacity:0.4; }
  100% { transform: scale(1); opacity:1; }
}

.pulse { animation: markerPulse 1.5s infinite; }

/* Loading overlay */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.4s;
}

.load-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.load-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
}
</style>
</head>

// ============================================================
// TYPE COLORS
// ============================================================
const TYPE_COLOR = {
  "Mob Lynching":     "#f03e3e",
  "Physical Assault": "#fd7e14",
  "Property Attack":  "#20c997",
  "Communal Riot":    "#9775fa",
  "Hate Speech":      "#f783ac",
  "Threats/Coercion": "#4dabf7",
  "General Report":   "#555880",
};

const OUTCOME_CONFIG = {
  convicted:        { bg:"rgba(32,201,151,0.15)", color:"#20c997", icon:"⚖️", text:"Convicted" },
  acquitted_accused:{ bg:"rgba(240,62,62,0.15)",  color:"#f03e3e", icon:"❌", text:"Accused Acquitted" },
  partial_justice:  { bg:"rgba(245,159,0,0.15)",  color:"#f59f00", icon:"⚠️", text:"Partial Justice" },
  minimal_action:   { bg:"rgba(253,126,20,0.15)", color:"#fd7e14", icon:"🔶", text:"Minimal Action" },
  minimal_justice:  { bg:"rgba(253,126,20,0.15)", color:"#fd7e14", icon:"🔶", text:"Minimal Justice" },
  ongoing:          { bg:"rgba(77,171,247,0.15)", color:"#4dabf7", icon:"🔄", text:"Ongoing" },
};

// ============================================================
// APP STATE
// ============================================================
let map, heatLayer, markerGroup;
let currentType = 'all';
let currentView = 'pins';
let selectedId  = null;
let allMarkers  = [];

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  map = L.map('map', {
    center: [22.5, 80],
    zoom: 5,
    zoomControl: true,
    attributionControl: false,
  });

  // Clean dark tile
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
  }).addTo(map);

  markerGroup = L.layerGroup().addTo(map);
}

// ============================================================
// MARKER ICONS
// ============================================================
function makeIcon(color, size=14, selected=false) {
  const s = selected ? size + 4 : size;
  const glow = selected ? `box-shadow:0 0 0 3px ${color}44, 0 0 20px ${color}66` : `box-shadow:0 0 8px ${color}88`;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${s}px; height:${s}px;
      background:${color};
      border-radius:50%;
      border: ${selected ? '2px' : '1.5px'} solid rgba(255,255,255,${selected?'0.8':'0.3'});
      ${glow};
      transition: all 0.2s;
    "></div>`,
    iconSize: [s, s],
    iconAnchor: [s/2, s/2],
  });
}

// ============================================================
// RENDER MAP
// ============================================================
function renderMap() {
  markerGroup.clearLayers();
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  allMarkers = [];

  const data = getFiltered();
  updateStats(data);

  if (currentView === 'heat') {
    const pts = data.map(d => [d.lat, d.lng, 0.6 + d.deaths * 0.01]);
    heatLayer = L.heatLayer(pts, {
      radius: 40, blur: 25, maxZoom: 10,
      gradient: { 0.2:'#20c997', 0.5:'#f59f00', 0.8:'#f03e3e', 1:'#fff' }
    }).addTo(map);
    return;
  }

  if (currentView === 'cluster') {
    // Simple grid clustering
    const grid = {};
    data.forEach(d => {
      const key = `${Math.round(d.lat*5)/5}_${Math.round(d.lng*5)/5}`;
      if (!grid[key]) grid[key] = { items:[], lat:d.lat, lng:d.lng };
      grid[key].items.push(d);
    });
    Object.values(grid).forEach(g => {
      const n = g.items.length;
      const dominant = g.items.sort((a,b)=>b.deaths-a.deaths)[0];
      const color = TYPE_COLOR[dominant.type] || '#888';
      L.circle([g.lat, g.lng], {
        radius: Math.max(30000, n*20000),
        color, fillColor: color, fillOpacity:0.08,
        weight:1, dashArray:'3 5'
      }).addTo(markerGroup);
      L.marker([g.lat, g.lng], {
        icon: L.divIcon({
          className:'',
          html:`<div style="background:rgba(5,6,14,0.9);border:1px solid ${color};color:${color};padding:3px 8px;border-radius:20px;font-family:DM Mono,monospace;font-size:11px;font-weight:500;white-space:nowrap">${n}</div>`,
          iconAnchor:[16,10]
        })
      })
      .bindTooltip(g.items.map(i=>`${i.title}<br><i>${i.year}</i>`).join('<br>───<br>'), {className:'leaflet-tooltip'})
      .on('click', () => openCase(g.items[0].id))
      .addTo(markerGroup);
    });
    return;
  }

  // Default: pins
  data.forEach(d => {
    const color = TYPE_COLOR[d.type] || '#888';
    const selected = d.id === selectedId;
    const size = Math.min(22, 12 + Math.sqrt(d.deaths + d.injured) * 1.2);
    const marker = L.marker([d.lat, d.lng], {
      icon: makeIcon(color, size, selected)
    });

    marker.bindTooltip(`
      <b>${d.title}</b><br>
      <span style="color:${color}">${d.type}</span> · ${d.year}<br>
      ${d.state}${d.deaths > 0 ? ` · ☠ ${d.deaths}` : ''}
    `, { className:'leaflet-tooltip', sticky:true });

    marker.on('click', () => openCase(d.id));
    marker.addTo(markerGroup);
    allMarkers.push({ id: d.id, marker, color });
  });
}

// ============================================================
// FILTERS
// ============================================================
function getFiltered() {
  return currentType === 'all'
    ? INCIDENTS
    : INCIDENTS.filter(d => d.type === currentType);
}

function setTypeFilter(type, btn) {
  currentType = type;
  document.querySelectorAll('.tf').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderMap();
}

function setView(v) {
  currentView = v;
  ['pins','heat','cluster'].forEach(x => {
    document.getElementById('vb-'+x).classList.toggle('on', x===v);
  });
  renderMap();
}

// ============================================================
// STATS
// ============================================================
function updateStats(data) {
  document.getElementById('s-count').textContent   = data.length;
  document.getElementById('s-deaths').textContent  = data.reduce((a,d)=>a+d.deaths,0);
  document.getElementById('s-states').textContent  = new Set(data.map(d=>d.state)).size;
}

// ============================================================
// OPEN CASE
// ============================================================
function openCase(id) {
  const d = INCIDENTS.find(i => i.id === id);
  if (!d) return;
  selectedId = id;

  // Re-render markers to highlight selected
  if (currentView === 'pins') {
    allMarkers.forEach(m => {
      const inc = INCIDENTS.find(i => i.id === m.id);
      const size = Math.min(22, 12 + Math.sqrt(inc.deaths + inc.injured) * 1.2);
      m.marker.setIcon(makeIcon(m.color, size, m.id === id));
    });
  }

  // Fly to location
  map.flyTo([d.lat, d.lng], 8, { duration: 0.8 });

  const color  = TYPE_COLOR[d.type] || '#888';
  const oc     = OUTCOME_CONFIG[d.outcome] || OUTCOME_CONFIG.ongoing;
  const related = INCIDENTS.filter(i => (d.related||[]).includes(i.id));

  const html = `
    <div>
      <span class="case-type-tag" style="background:${color}22;color:${color}">
        ● ${d.type}
      </span>

      <div class="case-title">${d.title}</div>

      <div class="case-meta-row">
        <div class="meta-chip">📅 <b>${d.date || d.year}</b></div>
        <div class="meta-chip">📍 <b>${d.district}, ${d.state}</b></div>
        ${d.deaths > 0 ? `<div class="meta-chip" style="border-color:rgba(240,62,62,0.4)">☠ <b style="color:#f03e3e">${d.deaths} killed</b></div>` : ''}
        ${d.injured > 0 ? `<div class="meta-chip">🤕 <b>${d.injured} injured</b></div>` : ''}
      </div>

      <div class="outcome-badge" style="background:${oc.bg};color:${oc.color}">
        ${oc.icon} ${oc.text} — <span style="opacity:0.8;font-size:11px">${d.outcome_text}</span>
      </div>

      <div class="case-section-title">What Happened</div>
      <div class="case-desc">${d.description}</div>

      <div class="case-divider"></div>

      ${d.timeline ? `
        <div class="case-section-title">Timeline</div>
        <div class="timeline">
          ${d.timeline.map(t => `
            <div class="tl-item ${t.key?'key':''}">
              <div class="tl-date">${t.date}</div>
              <div class="tl-text">${t.text}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="case-divider"></div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-box-label">Victims</div>
          <div class="info-box-val">${(d.victims||[]).join('<br>')}</div>
        </div>
        <div class="info-box">
          <div class="info-box-label">Accused / Perpetrators</div>
          <div class="info-box-val">${(d.accused||[]).join('<br>')}</div>
        </div>
      </div>

      ${d.tags ? `
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">
          ${d.tags.map(t=>`<span style="background:var(--card);border:1px solid var(--border2);padding:2px 8px;border-radius:20px;font-family:var(--mono);font-size:9px;color:var(--muted)">#${t}</span>`).join('')}
        </div>
      ` : ''}

      <div class="case-divider"></div>

      <div class="case-section-title">📰 Related Articles & Sources</div>
      ${(d.articles||[]).map(a => `
        <a class="article-card" href="${a.url}" target="_blank" rel="noopener">
          <span class="ext-icon">↗</span>
          <div class="article-source" style="color:${a.color}">${a.source}</div>
          <div class="article-title">${a.title}</div>
          <div class="article-date">${a.date}</div>
        </a>
      `).join('')}

      ${related.length > 0 ? `
        <div class="case-divider"></div>
        <div class="case-section-title">🔗 Related Cases (${related.length})</div>
        ${related.map(r => `
          <div class="related-case" onclick="openCase(${r.id})">
            <div class="rc-dot" style="background:${TYPE_COLOR[r.type]||'#888'}"></div>
            <div class="rc-title">${r.title}</div>
            <div class="rc-year">${r.year}</div>
          </div>
        `).join('')}
      ` : ''}

      <div style="height:20px"></div>
    </div>
  `;

  document.getElementById('case-scroll').innerHTML = html;
  document.getElementById('case-scroll').scrollTop = 0;

  const panel = document.getElementById('case-panel');
  const closeBtn = document.getElementById('panel-close');
  panel.classList.add('open');
  closeBtn.classList.add('show');
}

function closePanel() {
  document.getElementById('case-panel').classList.remove('open');
  document.getElementById('panel-close').classList.remove('show');
  selectedId = null;
  if (currentView === 'pins') renderMap();
}

// ============================================================
// SEARCH
// ============================================================
function searchCases(q) {
  if (!q.trim()) return;
  const ql = q.toLowerCase();
  const hits = INCIDENTS.filter(d =>
    d.title.toLowerCase().includes(ql) ||
    d.state.toLowerCase().includes(ql) ||
    d.description.toLowerCase().includes(ql) ||
    (d.tags||[]).some(t => t.includes(ql))
  );
  if (hits.length === 1) {
    openCase(hits[0].id);
  } else if (hits.length > 1) {
    document.getElementById('case-scroll').innerHTML = `
      <div style="padding:10px 0 8px;font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px">${hits.length} results for "${q}"</div>
      ${hits.map(d => `
        <div class="related-case" onclick="openCase(${d.id})" style="margin-bottom:6px">
          <div class="rc-dot" style="background:${TYPE_COLOR[d.type]||'#888'}"></div>
          <div>
            <div class="rc-title">${d.title}</div>
            <div class="rc-year">${d.year} · ${d.state}</div>
          </div>
        </div>
      `).join('')}
    `;
    document.getElementById('case-panel').classList.add('open');
    document.getElementById('panel-close').classList.add('show');
  }
}

// ============================================================
// BOOT
// ============================================================
window.onload = () => {
  initMap();
  renderMap();
  setTimeout(() => {
    const l = document.getElementById('loading');
    l.style.opacity = '0';
    setTimeout(() => l.style.display = 'none', 400);
  }, 600);
};
</script>
</body>
</html>
